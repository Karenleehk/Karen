<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八字修煉儀 v6.5 - 黑金精品版</title>
    <style>
        :root {
            --bg-color: #121212;       /* 深邃黑 */
            --card-bg: #1e1e1e;        /* 深灰卡牌 */
            --gold: #d4af37;           /* 經典金 */
            --gold-light: #f1c40f;
            --text-main: #e0e0e0;      /* 亮灰文字 */
            --text-sub: #666666;
            --btn-shadow: 0 4px 0px rgba(0,0,0,0.5);
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: sans-serif; 
            text-align: center; 
            padding: 10px; margin: 0; 
            touch-action: manipulation;
        }

        #game-container { 
            max-width: 480px; 
            margin: 15px auto; 
            background: var(--card-bg); 
            padding: 25px 20px; 
            border-radius: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
        }

        /* 模式選擇器 */
        .mode-selector { 
            display: flex; flex-wrap: wrap; gap: 6px; 
            margin-bottom: 25px; background: #2a2a2a; 
            padding: 5px; border-radius: 12px; 
        }
        .mode-selector button { 
            flex: 1 1 30%; padding: 10px 0; font-size: 0.85rem; 
            background: transparent; border: none; color: #888; 
            cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        .active-mode { 
            background: #444 !important; color: var(--gold-light) !important; font-weight: bold; 
        }

        /* 題目區 */
        #quest { 
            font-size: 1.5rem; margin: 20px 0; font-weight: bold; 
            color: var(--gold-light); min-height: 50px; 
        }

        /* 日元卡牌 */
        #day-master-area { height: 130px; display: flex; justify-content: center; align-items: center; }
        #day-master-box { 
            background: linear-gradient(135deg, var(--gold) 0%, #8a6d1d 100%); 
            color: #121212; width: 85px; height: 105px; border-radius: 15px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border: 2px solid var(--gold-light); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); 
        }
        #current-dm { font-size: 2.8rem; font-weight: 900; }

        /* 按鈕設計 */
        #options { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 12px; }
        .opt-btn { 
            font-size: 1.5rem; height: 85px; cursor: pointer; border: none; 
            border-radius: 15px; font-weight: bold; color: #fff; 
            transition: 0.1s; box-shadow: var(--btn-shadow);
        }
        .opt-btn:active { transform: translateY(3px); box-shadow: none; }

        /* 五行顏色 */
        .木 { background: #27ae60 !important; }
        .火 { background: #e74c3c !important; }
        .土 { background: #a67c52 !important; }
        .金 { background: #d4af37 !important; color: #121212 !important; }
        .水 { background: #2980b9 !important; }
        .通用 { background: #3d3d3d !important; color: #fff !important; }

        /* 佈局切換 */
        body:not(.ten-gods-mode) #day-master-area { display: none; }
        .ten-gods-mode #options { grid-template-columns: 1fr 1fr; }
        .ten-gods-mode .opt-btn { height: 50px; font-size: 1.1rem; }
        .wide-layout #options { grid-template-columns: repeat(3, 1fr); }
    </style>
</head>
<body>

<div id="game-container">
    <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:#555; margin-bottom:10px;">
        <span>v6.5 Black Gold</span>
        <span id="score">分數: 0</span>
    </div>
    
    <h1 style="font-size:1.2rem; color:#888; margin:0;">八字全能修煉儀</h1>
    
    <div class="mode-selector">
        <button id="btn-五行" onclick="changeMode('五行')">五行</button>
        <button id="btn-天干" onclick="changeMode('天干')">天干</button>
        <button id="btn-地支" onclick="changeMode('地支')">地支</button>
        <button id="btn-十神" onclick="changeMode('十神')">十神</button>
        <button id="btn-關係" onclick="changeMode('關係')">關係</button>
    </div>

    <div id="quest">加載中...</div>

    <div id="day-master-area">
        <div id="day-master-box">
            <div style="font-size:0.7rem; font-weight:bold;">日元</div>
            <div id="current-dm">甲</div>
        </div>
    </div>

    <div id="feedback" style="height:35px; margin:10px 0; font-weight:bold; font-size:1.2rem;"></div>
    <div id="options"></div>
</div>

<script>
// 資料與邏輯（簡化優化版）
const database = {
    "天干": [
        {id:"甲",type:"木",yinYang:"陽",dir:"東方",season:"春季"},{id:"乙",type:"木",yinYang:"陰",dir:"東方",season:"春季"},
        {id:"丙",type:"火",yinYang:"陽",dir:"南方",season:"夏季"},{id:"丁",type:"火",yinYang:"陰",dir:"南方",season:"夏季"},
        {id:"戊",type:"土",yinYang:"陽",dir:"中央",season:"長夏"},{id:"己",type:"土",yinYang:"陰",dir:"中央",season:"長夏"},
        {id:"庚",type:"金",yinYang:"陽",dir:"西方",season:"秋季"},{id:"辛",type:"金",yinYang:"陰",dir:"西方",season:"秋季"},
        {id:"壬",type:"水",yinYang:"陽",dir:"北方",season:"冬季"},{id:"癸",type:"水",yinYang:"陰",dir:"北方",season:"冬季"}
    ],
    "地支": [
        {id:"子",type:"水",animal:"鼠",time:"23-01",hidden:["癸"]},{id:"丑",type:"土",animal:"牛",time:"01-03",hidden:["己","癸","辛"]},
        {id:"寅",type:"木",animal:"虎",time:"03-05",hidden:["甲","丙","戊"]},{id:"卯",type:"木",animal:"兔",time:"05-07",hidden:["乙"]},
        {id:"辰",type:"土",animal:"龍",time:"07-09",hidden:["戊","乙","癸"]},{id:"巳",type:"火",animal:"蛇",time:"09-11",hidden:["丙","庚","戊"]},
        {id:"午",type:"火",animal:"馬",time:"11-13",hidden:["丁","己"]},{id:"未",type:"土",animal:"羊",time:"13-15",hidden:["己","丁","乙"]},
        {id:"申",type:"金",animal:"猴",time:"15-17",hidden:["庚","壬","戊"]},{id:"酉",type:"金",animal:"雞",time:"17-19",hidden:["辛"]},
        {id:"戌",type:"土",animal:"犬",time:"19-21",hidden:["戊","辛","丁"]},{id:"亥",type:"水",animal:"豬",time:"21-23",hidden:["壬","甲"]}
    ],
    "十神": ["比肩","劫財","食神","傷官","偏財","正財","七殺","正官","偏印","正印"],
    "方位": ["東方","南方","中央","西方","北方"],
    "季節": ["春季","夏季","長夏","秋季","冬季"]
};

const sRel = {
    "生": {"木":"火", "火":"土", "土":"金", "金":"水", "水":"木"},
    "剋": {"木":"土", "土":"水", "水":"火", "火":"金", "金":"木"}
};

const relations = {
    "沖": {"子":"午","午":"子","丑":"未","未":"丑","寅":"申","申":"寅","卯":"酉","酉":"卯","辰":"戌","戌":"辰","巳":"亥","亥":"巳"},
    "合": {"子":"丑","丑":"子","寅":"亥","亥":"寅","卯":"戌","戌":"卯","辰":"酉","酉":"辰","巳":"申","申":"巳","午":"未","未":"午"},
    "害": {"子":"未","未":"子","丑":"午","午":"丑","寅":"巳","巳":"寅","卯":"辰","辰":"卯","申":"亥","亥":"申","酉":"戌","戌":"酉"}
};

let currentMode = "五行", score = 0, currentCorrectList = [], userSelectedList = [];

function changeMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-selector button').forEach(b => b.classList.remove('active-mode'));
    document.getElementById('btn-' + mode).classList.add('active-mode');
    document.body.className = "";
    if (mode === '十神') document.body.classList.add('ten-gods-mode');
    if (mode === '地支' || mode === '關係') document.body.classList.add('wide-layout');
    nextQuestion();
}

function nextQuestion() {
    const q = document.getElementById('quest');
    const opt = document.getElementById('options');
    document.getElementById('feedback').innerText = "";
    opt.innerHTML = "";
    userSelectedList = [];

    if (currentMode === "天干") {
        const stem = database.天干[Math.floor(Math.random() * 10)];
        const sub = Math.floor(Math.random() * 3);
        if(sub === 0) {
            q.innerText = `【${stem.id}】的「方位」？`;
            currentCorrectList = [stem.dir]; renderButtons(database.方位, "通用");
        } else if(sub === 1) {
            q.innerText = `【${stem.id}】的「季節」？`;
            currentCorrectList = [stem.season]; renderButtons(database.季節, "通用");
        } else {
            q.innerText = `【${stem.id}】屬什麼五行？`;
            currentCorrectList = [stem.type]; renderButtons(["木","火","土","金","水"], "auto");
        }
    } else if (currentMode === "十神") {
        const dm = database.天干[Math.floor(Math.random() * 10)];
        const tg = database.天干[Math.floor(Math.random() * 10)];
        document.getElementById('current-dm').innerText = dm.id;
        q.innerText = `對【${dm.id}】來說，【${tg.id}】是？`;
        currentCorrectList = [calcTenGod(dm, tg)]; renderButtons(database.十神, "通用");
    } else if (currentMode === "地支") {
        const b = database.地支[Math.floor(Math.random() * 12)];
        const sub = Math.floor(Math.random() * 2);
        if(sub === 0) {
            q.innerText = `【${b.id}】的「藏干」？`;
            currentCorrectList = b.hidden; renderButtons(database.天干, "auto");
        } else {
            q.innerText = `時辰【${b.time}】是誰？`;
            currentCorrectList = [b.id]; renderButtons(database.地支, "auto");
        }
    } else if (currentMode === "關係") {
        const rType = ["沖", "合", "害"][Math.floor(Math.random() * 3)];
        const b = database.地支[Math.floor(Math.random() * 12)];
        q.innerText = `【${b.id}】的六「${rType}」是？`;
        currentCorrectList = [relations[rType][b.id]]; renderButtons(database.地支, "auto");
    } else {
        const els = ["木","火","土","金","水"];
        const el = els[Math.floor(Math.random() * 5)];
        const task = Math.random() > 0.5 ? "生" : "剋";
        q.innerText = `${task} ➔ 【${el}】的是？`;
        const target = task === "生" ? Object.keys(sRel.生).find(k=>sRel.生[k]===el) : Object.keys(sRel.剋).find(k=>sRel.剋[k]===el);
        currentCorrectList = [target]; renderButtons(els, "auto");
    }
}

function renderButtons(arr, colorMode) {
    const container = document.getElementById('options');
    arr.forEach(item => {
        const val = typeof item === 'string' ? item : item.id;
        const color = colorMode === "auto" ? (item.type || val) : colorMode;
        const btn = document.createElement('button');
        btn.className = `opt-btn ${color}`;
        btn.innerText = val;
        btn.onclick = () => {
            if (currentCorrectList.includes(val)) {
                if (document.getElementById('quest').innerText.includes("藏干")) {
                    if(!userSelectedList.includes(val)) {
                        userSelectedList.push(val); btn.style.opacity = "0.2";
                        if(userSelectedList.length === currentCorrectList.length) end(true, "✅ 藏干全對！");
                    }
                } else end(true, "✅ 正確！");
            } else end(false, "❌ 答案: " + currentCorrectList.join(","));
        };
        container.appendChild(btn);
    });
}

function calcTenGod(dm, tg) {
    const same = dm.yinYang === tg.yinYang;
    if (dm.type === tg.type) return same ? "比肩" : "劫財";
    if (sRel.生[dm.type] === tg.type) return same ? "食神" : "傷官";
    if (sRel.剋[dm.type] === tg.type) return same ? "偏財" : "正財";
    if (sRel.剋[tg.type] === dm.type) return same ? "七殺" : "正官";
    if (sRel.生[tg.type] === dm.type) return same ? "偏印" : "正印";
}

function end(win, msg) {
    const fb = document.getElementById('feedback');
    fb.innerText = msg; fb.style.color = win ? "#2ecc71" : "#e74c3c";
    if(win) { score += 10; document.getElementById('score').innerText = "分數: " + score; }
    document.querySelectorAll('.opt-btn').forEach(b => b.style.pointerEvents = "none");
    setTimeout(nextQuestion, 1200);
}
changeMode('五行');
</script>
</body>
</html>
